<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My English Journey 2026 Spring</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>🌸 My English Journey</h1>

    <h2>Spring 2026</h2>

    <p class="subtitle">
        Enter your Student ID to check your Presentation result,
        Stickers and Message from Yanyan.
    </p>

    <div class="search-box">

        <input
            id="studentId"
            type="text"
            inputmode="numeric"
            placeholder="Student ID">

        <button id="searchButton" type="button">
            Search
        </button>

    </div>

    <div id="status" class="status">
        Loading student information...
    </div>

    <div id="result" class="result"></div>

</div>

</html>
