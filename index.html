<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>My English Journey 2026 Spring</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container">

        <header class="page-header">

            <h1>🌸 My English Journey</h1>

            <h2>Spring 2026</h2>

            <p class="subtitle">
                Enter your Student ID to check your presentation result,
                stickers and message from Yanyan.
            </p>

        </header>

        <div class="search-box">

            <input
                type="text"
                id="studentId"
                placeholder="Student ID"
                autocomplete="off"
            >

            <button id="searchButton" type="button">
                Search
            </button>

        </div>

        <p id="loadingStatus" class="loading-status">
            Loading student information...
        </p>

        <div id="result" class="result"></div>

    </main>

    <!-- Excel library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- Website program -->
    <script src="./script.js?v=30"></script>

</body>

</html>
